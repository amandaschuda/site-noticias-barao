<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Site Barão Antonina</title>
        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            body {
                font-family: 'inter', sans-serif;
                background-color: white;
            }

            .breaking-new {
                background: #dc2626;
                color: white;
                padding: 0.5rem 0;
                font-size: 0.0rem;
            }

            .ticker-wrap {
                overflow: hidden;
                white-space: nowrap;
            }

            .ticker {
                display: inline-block;
                animation: ticker 30s linear infinite;
            }

            @keyframes ticker {
                0% {transform: translateX(100%);}
                100% {transform: translateX(-100%);}
            }
                
        </style>
    </head>
    <body>
        
        <!-- Breaking news ticker -->
            <div class="breaking-new">
                <div class="container">
                    <div class="d-flex align-intems-center">
                        <span class="badge bg-white text-danger me-3">Útima Notícia</span>
                        <div class="ticker-wrap flex-grow-1">
                            <div class="ticker">
                                📰 Útima notícia do colégio. 👀 Confira no site.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        
        
        
        
        
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
